<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 250" role="img" aria-labelledby="title desc">
<title id="title">ADC measurement chain</title><desc id="desc">A physical quantity changes a sensor, the sensor circuit produces a voltage, the Arduino ADC converts the voltage into a count, and code converts the count into a plotted or calculated value.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#254b67"/></marker><style>.b{fill:#f5f8fb;stroke:#254b67;stroke-width:3}.a{stroke:#254b67;stroke-width:4;fill:none;marker-end:url(#arrow)}.t{font-family:Arial,Helvetica,sans-serif;fill:#15232f}.h{font-size:23px;font-weight:700}.s{font-size:17px}.w{stroke:#b14738;stroke-width:4;fill:none}.d{stroke:#357a45;stroke-width:4;fill:none;stroke-linejoin:round}</style></defs>
<rect x="25" y="55" width="140" height="120" rx="8" class="b"/><text x="95" y="102" text-anchor="middle" class="t h">Physical</text><text x="95" y="132" text-anchor="middle" class="t h">quantity</text><text x="95" y="158" text-anchor="middle" class="t s">temperature</text>
<path d="M185 115 H255" class="a"/>
<rect x="275" y="55" width="140" height="120" rx="8" class="b"/><text x="345" y="103" text-anchor="middle" class="t h">Sensor</text><text x="345" y="133" text-anchor="middle" class="t s">resistance</text><text x="345" y="158" text-anchor="middle" class="t s">changes</text>
<path d="M435 115 H505" class="a"/>
<rect x="525" y="55" width="140" height="120" rx="8" class="b"/><text x="595" y="99" text-anchor="middle" class="t h">Circuit</text><text x="595" y="129" text-anchor="middle" class="t s">voltage at A0</text><path d="M555 153 C570 125,585 125,600 153 S630 181,645 153" class="w"/>
<path d="M685 115 H755" class="a"/>
<rect x="775" y="55" width="180" height="120" rx="8" class="b"/><text x="865" y="96" text-anchor="middle" class="t h">ADC + code</text><text x="865" y="126" text-anchor="middle" class="t s">count 0-1023</text><path d="M825 154 H842 V134 H860 V166 H880 V145 H898" class="d"/>
</svg>
