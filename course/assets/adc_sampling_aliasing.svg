<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
<title id="title">Sampling slow and fast signals</title><desc id="desc">A slow signal is captured well by ADC samples, while a fast signal can be misrepresented when sampled too slowly.</desc>
<style>.axis{stroke:#22313f;stroke-width:3}.grid{stroke:#d5dde5;stroke-width:1}.slow{stroke:#2f6f95;stroke-width:4;fill:none}.fast{stroke:#b14738;stroke-width:3;fill:none}.stem{stroke:#254b67;stroke-width:2;stroke-dasharray:5 5}.dot{fill:#254b67}.txt{font-family:Arial,Helvetica,sans-serif;fill:#15232f}.h{font-size:21px;font-weight:700}.s{font-size:16px}.box{fill:#f5f8fb;stroke:#254b67;stroke-width:2}</style>
<line x1="80" y1="300" x2="850" y2="300" class="axis"/><line x1="80" y1="300" x2="80" y2="55" class="axis"/><text x="465" y="350" text-anchor="middle" class="txt h">time</text><text x="32" y="180" text-anchor="middle" transform="rotate(-90 32 180)" class="txt h">voltage</text>
<g class="grid"><line x1="80" y1="240" x2="850" y2="240"/><line x1="80" y1="180" x2="850" y2="180"/><line x1="80" y1="120" x2="850" y2="120"/></g>
<path d="M90 190 C170 80,250 80,330 190 S490 300,570 190 S730 80,830 170" class="slow"/>
<path d="M90 190 C115 70,140 310,165 190 S215 70,240 190 S290 310,315 190 S365 70,390 190 S440 310,465 190 S515 70,540 190 S590 310,615 190 S665 70,690 190 S740 310,765 190 S815 70,840 190" class="fast" opacity="0.75"/>
<g><line x1="130" y1="300" x2="130" y2="135" class="stem"/><circle cx="130" cy="135" r="7" class="dot"/><line x1="230" y1="300" x2="230" y2="92" class="stem"/><circle cx="230" cy="92" r="7" class="dot"/><line x1="330" y1="300" x2="330" y2="190" class="stem"/><circle cx="330" cy="190" r="7" class="dot"/><line x1="430" y1="300" x2="430" y2="288" class="stem"/><circle cx="430" cy="288" r="7" class="dot"/><line x1="530" y1="300" x2="530" y2="244" class="stem"/><circle cx="530" cy="244" r="7" class="dot"/><line x1="630" y1="300" x2="630" y2="135" class="stem"/><circle cx="630" cy="135" r="7" class="dot"/><line x1="730" y1="300" x2="730" y2="92" class="stem"/><circle cx="730" cy="92" r="7" class="dot"/></g>
<rect x="92" y="38" width="335" height="64" rx="7" class="box"/><text x="260" y="64" text-anchor="middle" class="txt s">slow thermistor-like signal</text><text x="260" y="88" text-anchor="middle" class="txt s">samples are meaningful</text><rect x="470" y="45" width="335" height="48" rx="7" class="box"/><text x="638" y="75" text-anchor="middle" class="txt s">fast PWM-like signal: use the oscilloscope</text>
</svg>
