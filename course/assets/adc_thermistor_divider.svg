<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" role="img" aria-labelledby="title desc">
<title id="title">Thermistor voltage divider</title>
<desc id="desc">A 100 kOhm fixed resistor connects from 5 V to A0. A 100 kOhm NTC thermistor connects from A0 to ground. Arduino A0 measures the divider voltage.</desc>
<style>
  .wire{stroke:#243746;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .thin{stroke:#243746;stroke-width:2;fill:none;stroke-linecap:round}
  .node{fill:#243746}
  .box{fill:#f5f8fb;stroke:#254b67;stroke-width:2}
  .txt{font-family:Arial,Helvetica,sans-serif;fill:#15232f}
  .h{font-size:22px;font-weight:700}
  .s{font-size:17px}
  .m{font-size:19px}
  .labelbg{fill:#ffffff;stroke:none;opacity:0.95}
</style>
<text x="82" y="55" text-anchor="middle" class="txt h">5 V</text>
<line x1="82" y1="70" x2="82" y2="105" class="wire"/>
<polyline points="82,105 62,118 102,138 62,158 102,178 62,198 82,212" class="wire"/>
<text x="128" y="152" class="txt m">R<tspan baseline-shift="sub" font-size="13">fixed</tspan> = 100 kOhm</text>
<line x1="82" y1="212" x2="82" y2="235" class="wire"/>
<line x1="82" y1="235" x2="365" y2="235" class="wire"/>
<circle cx="365" cy="235" r="7" class="node"/>
<text x="365" y="264" text-anchor="middle" class="txt s">divider voltage, V<tspan baseline-shift="sub" font-size="11">A0</tspan></text>
<line x1="365" y1="235" x2="520" y2="235" class="wire"/>
<polyline points="520,235 540,220 560,250 580,220 600,250 620,220 640,235" class="wire"/>
<text x="580" y="205" text-anchor="middle" class="txt m">R<tspan baseline-shift="sub" font-size="13">T</tspan> thermistor</text>
<text x="580" y="275" text-anchor="middle" class="txt s">100 kOhm near 25 C</text>
<line x1="640" y1="235" x2="735" y2="235" class="wire"/>
<line x1="735" y1="235" x2="735" y2="258" class="wire"/>
<line x1="705" y1="258" x2="765" y2="258" class="wire"/>
<line x1="715" y1="271" x2="755" y2="271" class="thin"/>
<line x1="725" y1="283" x2="745" y2="283" class="thin"/>
<text x="735" y="218" text-anchor="middle" class="txt h">GND</text>
<rect x="300" y="72" width="130" height="72" rx="8" class="box"/>
<text x="365" y="103" text-anchor="middle" class="txt h">Arduino</text>
<text x="365" y="128" text-anchor="middle" class="txt s">analog input</text>
<line x1="365" y1="144" x2="365" y2="228" class="wire"/>
<rect x="337" y="194" width="56" height="28" rx="4" class="labelbg"/>
<text x="365" y="215" text-anchor="middle" class="txt h">A0</text>
</svg>
