<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
<title id="title">PWM low-pass filtering</title><desc id="desc">A PWM waveform passes through a resistor and capacitor low-pass filter to produce a smoother average voltage with ripple.</desc>
<style>.wire{stroke:#243746;stroke-width:4;fill:none}.thin{stroke:#243746;stroke-width:2;fill:none}.pwm{stroke:#b14738;stroke-width:4;fill:none;stroke-linejoin:round}.avg{stroke:#2f6f95;stroke-width:5;fill:none}.txt{font-family:Arial,Helvetica,sans-serif;fill:#15232f}.h{font-size:22px;font-weight:700}.s{font-size:17px}.box{fill:#f5f8fb;stroke:#254b67;stroke-width:2}</style>
<text x="190" y="40" text-anchor="middle" class="txt h">PWM is switching</text><path d="M70 140 H105 V80 H155 V140 H220 V80 H300 V140 H345" class="pwm"/><text x="205" y="175" text-anchor="middle" class="txt s">duty cycle sets average power, not an analog level</text>
<text x="520" y="40" text-anchor="middle" class="txt h">RC low-pass filter</text><line x1="410" y1="120" x2="470" y2="120" class="wire"/><polyline points="470,120 485,105 500,135 515,105 530,135 545,105 560,120" class="wire"/><line x1="560" y1="120" x2="650" y2="120" class="wire"/><line x1="650" y1="120" x2="650" y2="175" class="wire"/><line x1="625" y1="175" x2="675" y2="175" class="wire"/><line x1="625" y1="195" x2="675" y2="195" class="wire"/><line x1="650" y1="195" x2="650" y2="245" class="wire"/><line x1="625" y1="245" x2="675" y2="245" class="wire"/><line x1="632" y1="257" x2="668" y2="257" class="thin"/><line x1="640" y1="267" x2="660" y2="267" class="thin"/><text x="515" y="95" text-anchor="middle" class="txt s">R</text><text x="685" y="190" class="txt s">C</text><text x="650" y="112" text-anchor="middle" class="txt s">V_out</text>
<text x="770" y="40" text-anchor="middle" class="txt h">filtered voltage</text><path d="M700 145 C735 115,760 113,790 124 S850 151,890 122" class="avg"/><path d="M700 132 C735 102,760 100,790 111 S850 138,890 109" class="avg" opacity="0.25"/><path d="M700 158 C735 128,760 126,790 137 S850 164,890 135" class="avg" opacity="0.25"/><text x="795" y="190" text-anchor="middle" class="txt s">smoother, but delayed and still has ripple</text><rect x="420" y="285" width="280" height="35" rx="6" class="box"/><text x="560" y="309" text-anchor="middle" class="txt s">time constant: tau = RC</text>
</svg>
