<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
<title id="title">Successive-approximation ADC</title>
<desc id="desc">The Arduino ADC samples Vin on a capacitor, compares it with a DAC trial voltage, and a successive approximation register keeps or clears bits until the digital output count is found.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M0 0 L10 5 L0 10 Z" fill="#243746"/>
  </marker>
  <style>
    .wire{stroke:#243746;stroke-width:4;fill:none;marker-end:url(#arrow)}
    .plain{stroke:#243746;stroke-width:4;fill:none}
    .box{fill:#f5f8fb;stroke:#254b67;stroke-width:3}
    .cap{stroke:#b14738;stroke-width:4}
    .txt{font-family:Arial,Helvetica,sans-serif;fill:#15232f}
    .h{font-size:22px;font-weight:700}
    .s{font-size:17px}
    .m{font-size:19px}
    .labelbg{fill:#ffffff;stroke:none;opacity:0.95}
  </style>
</defs>
<text x="55" y="83" class="txt h">V<tspan baseline-shift="sub" font-size="14">in</tspan></text>
<path d="M90 78 H170" class="wire"/>
<rect x="180" y="35" width="160" height="88" rx="8" class="box"/>
<text x="260" y="68" text-anchor="middle" class="txt h">Sample</text>
<text x="260" y="96" text-anchor="middle" class="txt s">and hold</text>
<line x1="235" y1="142" x2="285" y2="142" class="cap"/>
<line x1="235" y1="164" x2="285" y2="164" class="cap"/>
<text x="260" y="196" text-anchor="middle" class="txt s">small capacitor</text>
<path d="M340 78 H430" class="wire"/>
<polygon points="440,35 440,125 535,80" class="box"/>
<text x="480" y="83" text-anchor="middle" class="txt h">?</text>
<rect x="620" y="35" width="220" height="90" rx="8" class="box"/>
<text x="730" y="68" text-anchor="middle" class="txt h">SAR logic</text>
<text x="730" y="96" text-anchor="middle" class="txt s">try bits high to low</text>
<path d="M535 80 H610" class="wire"/>
<rect x="610" y="205" width="150" height="75" rx="8" class="box"/>
<text x="685" y="235" text-anchor="middle" class="txt h">DAC</text>
<text x="685" y="262" text-anchor="middle" class="txt s">trial voltage</text>
<path d="M730 125 V195" class="wire"/>
<path d="M610 242 H485 V130" class="plain"/>
<path d="M485 130 V118" class="wire"/>
<rect x="418" y="144" width="140" height="31" rx="4" class="labelbg"/>
<text x="488" y="166" text-anchor="middle" class="txt s">comparator</text>
<path d="M840 80 H920" class="wire"/>
<text x="925" y="84" class="txt h">N</text>
<rect x="665" y="137" width="240" height="26" rx="4" class="labelbg"/>
<text x="785" y="156" text-anchor="middle" class="txt m">10-bit result: 0 to 1023</text>
<text x="135" y="300" text-anchor="middle" class="txt s">1. sample V<tspan baseline-shift="sub" font-size="11">in</tspan></text>
<text x="355" y="300" text-anchor="middle" class="txt s">2. DAC makes trial voltages</text>
<text x="615" y="300" text-anchor="middle" class="txt s">3. comparator answers high/low</text>
<text x="850" y="300" text-anchor="middle" class="txt s">4. bits form N</text>
</svg>
