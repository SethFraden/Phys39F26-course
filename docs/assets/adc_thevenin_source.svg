<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 330" role="img" aria-labelledby="title desc">
<title id="title">Divider Thevenin equivalent</title><desc id="desc">A resistor divider is equivalent to a Thevenin voltage source and Thevenin resistance feeding the ADC input capacitance.</desc>
<style>.wire{stroke:#243746;stroke-width:4;fill:none}.thin{stroke:#243746;stroke-width:2;fill:none}.cap{stroke:#b14738;stroke-width:4}.txt{font-family:Arial,Helvetica,sans-serif;fill:#15232f}.h{font-size:22px;font-weight:700}.s{font-size:17px}.box{fill:#f5f8fb;stroke:#254b67;stroke-width:2}</style>
<text x="190" y="35" text-anchor="middle" class="txt h">Actual divider</text><line x1="90" y1="75" x2="90" y2="125" class="wire"/><polyline points="90,125 75,135 105,150 75,165 105,180 75,195 90,205" class="wire"/><line x1="90" y1="205" x2="90" y2="250" class="wire"/><line x1="90" y1="75" x2="90" y2="60" class="wire"/><text x="90" y="52" text-anchor="middle" class="txt s">5 V</text><text x="125" y="165" class="txt s">R_fixed</text><line x1="90" y1="250" x2="90" y2="280" class="wire"/><line x1="65" y1="280" x2="115" y2="280" class="wire"/><line x1="72" y1="292" x2="108" y2="292" class="thin"/><line x1="80" y1="302" x2="100" y2="302" class="thin"/><line x1="90" y1="205" x2="220" y2="205" class="wire"/><circle cx="220" cy="205" r="5" fill="#243746"/><text x="230" y="198" class="txt s">A0</text><polyline points="220,205 205,215 235,230 205,245 235,260 205,275 220,285" class="wire"/><text x="248" y="252" class="txt s">R_thermistor</text><line x1="220" y1="285" x2="220" y2="305" class="wire"/>
<text x="470" y="175" text-anchor="middle" class="txt h">equivalent to</text>
<text x="725" y="35" text-anchor="middle" class="txt h">Thevenin source feeding ADC</text><circle cx="620" cy="165" r="36" class="wire"/><text x="620" y="172" text-anchor="middle" class="txt s">V_th</text><line x1="620" y1="85" x2="620" y2="129" class="wire"/><line x1="620" y1="201" x2="620" y2="265" class="wire"/><line x1="595" y1="265" x2="645" y2="265" class="wire"/><line x1="602" y1="277" x2="638" y2="277" class="thin"/><line x1="610" y1="287" x2="630" y2="287" class="thin"/><line x1="620" y1="85" x2="700" y2="85" class="wire"/><polyline points="700,85 715,70 730,100 745,70 760,100 775,70 790,85" class="wire"/><line x1="790" y1="85" x2="850" y2="85" class="wire"/><text x="745" y="58" text-anchor="middle" class="txt s">R_th</text><line x1="850" y1="85" x2="850" y2="138" class="wire"/><line x1="830" y1="138" x2="870" y2="138" class="cap"/><line x1="830" y1="160" x2="870" y2="160" class="cap"/><line x1="850" y1="160" x2="850" y2="265" class="wire"/><text x="865" y="154" class="txt s">C_sample</text><text x="850" y="76" text-anchor="middle" class="txt s">A0</text><rect x="805" y="185" width="90" height="44" rx="6" class="box"/><text x="850" y="213" text-anchor="middle" class="txt s">ADC</text>
