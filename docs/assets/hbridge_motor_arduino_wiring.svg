<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Complete Arduino, BTS7960 H-bridge, 12 volt power supply, and DC motor wiring</title>
  <desc id="desc">A 12 volt supply connects V plus directly to B plus and V minus directly to B minus. A DC motor connects to M plus and M minus through two isolated paired positions on a terminal bus. Arduino pin 9 connects to RPWM, pin 10 connects to LPWM, Arduino 5 volts connects to R EN, L EN, and VCC, and Arduino ground connects to H-bridge ground. R IS and L IS are not connected.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#20313e" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#304b5d"/>
    </marker>
    <clipPath id="arduinoCrop">
      <rect x="85" y="640" width="500" height="445" rx="20"/>
    </clipPath>
    <style>
      .title { font: 700 38px Arial, sans-serif; fill: #17324a; }
      .subtitle { font: 22px Arial, sans-serif; fill: #425b6d; }
      .card { fill: #fff; stroke: #9eb1be; stroke-width: 3; filter: url(#shadow); }
      .card-title { font: 700 27px Arial, sans-serif; fill: #17324a; }
      .label { font: 700 20px Arial, sans-serif; fill: #17324a; }
      .small { font: 18px Arial, sans-serif; fill: #425b6d; }
      .tiny { font: 16px Arial, sans-serif; fill: #425b6d; }
      .terminal { fill: #f7fafc; stroke: #617987; stroke-width: 2.5; }
      .bus-pair { stroke: #7c8d97; stroke-width: 9; stroke-linecap: round; }
      .bus-screw { fill: #dce4e9; stroke: #526773; stroke-width: 3; }
      .pin-number { font: 700 16px Arial, sans-serif; fill: #5a6d79; }
      .pin-name { font: 700 18px Arial, sans-serif; fill: #172b3a; }
      .wire { fill: none; stroke-width: 11; stroke-linecap: round; stroke-linejoin: round; }
      .red { stroke: #d6372f; }
      .black { stroke: #20272c; }
      .orange { stroke: #f09822; }
      .blue { stroke: #2477bd; }
      .purple { stroke: #7d4bc4; }
      .teal { stroke: #008f95; }
      .wire-label { font: 700 18px Arial, sans-serif; paint-order: stroke; stroke: #fff; stroke-width: 7; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="#eef4f7"/>
  <text class="title" x="900" y="52" text-anchor="middle">Complete H-Bridge Motor Wiring</text>
  <text class="subtitle" x="900" y="84" text-anchor="middle">12 V power stage plus six Arduino logic connections</text>
  <rect x="390" y="101" width="1020" height="42" rx="21" fill="#fff2c8" stroke="#d7aa23" stroke-width="2"/>
  <text x="900" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6b4d00">POWER OFF WHILE WIRING - START WITH PWM = 0 - TEC DISCONNECTED</text>

  <!-- 12 V supply -->
  <rect class="card" x="45" y="180" width="350" height="315" rx="22"/>
  <text class="card-title" x="220" y="220" text-anchor="middle">12 V Power Supply</text>
  <rect x="92" y="245" width="255" height="165" rx="13" fill="#4d5860" stroke="#222b31" stroke-width="4"/>
  <rect x="118" y="270" width="112" height="52" rx="5" fill="#17241b" stroke="#9aa8ae" stroke-width="2"/>
  <text x="174" y="306" text-anchor="middle" font-family="monospace" font-size="30" font-weight="700" fill="#73ef7c">12.0</text>
  <circle cx="280" cy="286" r="24" fill="#222" stroke="#aab5bb" stroke-width="4"/>
  <circle cx="280" cy="360" r="24" fill="#222" stroke="#aab5bb" stroke-width="4"/>
  <circle cx="330" cy="445" r="15" fill="#d6372f" stroke="#6e1c18" stroke-width="3"/>
  <circle cx="275" cy="445" r="15" fill="#20272c" stroke="#050607" stroke-width="3"/>
  <text class="label" x="330" y="480" text-anchor="middle" fill="#b32a24">V+</text>
  <text class="label" x="242" y="480" text-anchor="middle">V-</text>

  <!-- Exact H-bridge photo -->
  <rect class="card" x="565" y="170" width="520" height="375" rx="22"/>
  <text class="card-title" x="825" y="210" text-anchor="middle">BTS7960 H-Bridge</text>
  <image href="bts7960_module_photo.png" x="675" y="225" width="300" height="300" preserveAspectRatio="xMidYMid meet"/>
  <text class="tiny" x="825" y="527" text-anchor="middle">Exact module used in the course</text>

  <!-- High-current terminal strip -->
  <rect x="560" y="565" width="530" height="92" rx="16" fill="#f4f8fa" stroke="#8096a4" stroke-width="3"/>
  <text class="small" x="825" y="590" text-anchor="middle">High-current screw terminals - use 18 AWG wire</text>
  <g>
    <rect class="terminal" x="590" y="603" width="108" height="40" rx="9"/><text class="label" x="644" y="631" text-anchor="middle">B-</text>
    <rect class="terminal" x="712" y="603" width="108" height="40" rx="9"/><text class="label" x="766" y="631" text-anchor="middle">B+</text>
    <rect class="terminal" x="834" y="603" width="108" height="40" rx="9"/><text class="label" x="888" y="631" text-anchor="middle">M+</text>
    <rect class="terminal" x="956" y="603" width="108" height="40" rx="9"/><text class="label" x="1010" y="631" text-anchor="middle">M-</text>
  </g>

  <!-- Motor -->
  <rect class="card" x="1350" y="190" width="390" height="325" rx="22"/>
  <text class="card-title" x="1545" y="230" text-anchor="middle">12 V DC Motor</text>
  <g transform="translate(1400 265)">
    <rect x="55" y="25" width="205" height="125" rx="58" fill="#a8b0b5" stroke="#505a60" stroke-width="5"/>
    <ellipse cx="250" cy="87" rx="30" ry="58" fill="#818b91" stroke="#505a60" stroke-width="5"/>
    <rect x="276" y="75" width="85" height="24" rx="10" fill="#8e969b" stroke="#505a60" stroke-width="4"/>
    <rect x="25" y="55" width="48" height="64" rx="7" fill="#e8c900" stroke="#817200" stroke-width="4"/>
    <circle cx="22" cy="67" r="8" fill="#d6372f"/>
    <circle cx="22" cy="108" r="8" fill="#2477bd"/>
    <path d="M 119 165 A 70 45 0 0 0 216 165" fill="none" stroke="#304b5d" stroke-width="5" marker-end="url(#arrow)"/>
  </g>
  <text class="small" x="1545" y="480" text-anchor="middle">Direction reverses when PWM changes sides</text>

  <!-- Load terminal bus: each horizontal pair is connected; the two rows are isolated. -->
  <g>
    <rect x="1095" y="565" width="250" height="178" rx="18" fill="#fff8df" stroke="#a77c18" stroke-width="3"/>
    <text class="label" x="1220" y="595" text-anchor="middle">LOAD TERMINAL BUS</text>
    <text class="tiny" x="1220" y="618" text-anchor="middle">paired rows are isolated</text>
    <line class="bus-pair" x1="1135" y1="652" x2="1305" y2="652"/>
    <circle class="bus-screw" cx="1135" cy="652" r="14"/><circle class="bus-screw" cx="1305" cy="652" r="14"/>
    <line class="bus-pair" x1="1135" y1="708" x2="1305" y2="708"/>
    <circle class="bus-screw" cx="1135" cy="708" r="14"/><circle class="bus-screw" cx="1305" cy="708" r="14"/>
    <text class="tiny" x="1220" y="658" text-anchor="middle">M+ / motor</text>
    <text class="tiny" x="1220" y="714" text-anchor="middle">M- / motor</text>
  </g>

  <!-- Power-stage wires -->
  <path class="wire red" d="M 330 445 H 470 V 680 H 766 V 646"/>
  <path class="wire black" d="M 275 445 V 705 H 644 V 646"/>
  <path class="wire orange" d="M 888 646 V 652 H 1135"/>
  <path class="wire orange" d="M 1305 652 H 1380 V 332 H 1422"/>
  <path class="wire blue" d="M 1010 646 V 708 H 1135"/>
  <path class="wire blue" d="M 1305 708 H 1410 V 373 H 1422"/>
  <text class="wire-label" x="475" y="667" fill="#b72b25">V+ to B+</text>
  <text class="wire-label" x="438" y="697" fill="#20272c">V- to B-</text>
  <text class="wire-label" x="1015" y="637" fill="#b66c0b">M+</text>
  <text class="wire-label" x="1035" y="697" fill="#17629a">M-</text>
  <text class="tiny" x="505" y="726" text-anchor="middle">B+ and B- go directly to the power supply - not through the load bus</text>

  <!-- Arduino card and realistic board crop -->
  <rect class="card" x="45" y="765" width="685" height="390" rx="22"/>
  <text class="card-title" x="388" y="807" text-anchor="middle">Arduino Uno</text>
  <svg x="75" y="820" width="450" height="320" viewBox="130 20 650 800" preserveAspectRatio="xMidYMid meet">
    <image href="arduino_uno_pinout.png" width="1095" height="831"/>
  </svg>

  <!-- Arduino connection points -->
  <g>
    <rect x="530" y="840" width="170" height="48" rx="10" fill="#f3edff" stroke="#7d4bc4" stroke-width="3"/><text class="label" x="615" y="871" text-anchor="middle">D9 (PWM)</text>
    <rect x="530" y="902" width="170" height="48" rx="10" fill="#e8f8f8" stroke="#008f95" stroke-width="3"/><text class="label" x="615" y="933" text-anchor="middle">D10 (PWM)</text>
    <rect x="530" y="985" width="170" height="48" rx="10" fill="#fff0ef" stroke="#d6372f" stroke-width="3"/><text class="label" x="615" y="1016" text-anchor="middle">5V</text>
    <rect x="530" y="1047" width="170" height="48" rx="10" fill="#eef0f1" stroke="#20272c" stroke-width="3"/><text class="label" x="615" y="1078" text-anchor="middle">GND (0V)</text>
  </g>

  <!-- H-bridge logic header -->
  <rect class="card" x="840" y="790" width="900" height="365" rx="22"/>
  <text class="card-title" x="1290" y="830" text-anchor="middle">BTS7960 Logic Header</text>
  <text class="small" x="1290" y="858" text-anchor="middle">Physical two-row header: pins 7/5/3/1 above pins 8/6/4/2</text>

  <g transform="translate(930 885)">
    <!-- top row -->
    <rect class="terminal" x="0" y="0" width="175" height="75" rx="10"/>
    <text class="pin-number" x="18" y="23">7</text><text class="pin-name" x="88" y="45" text-anchor="middle">VCC</text><text class="tiny" x="88" y="66" text-anchor="middle">Arduino 5V</text>
    <rect class="terminal" x="190" y="0" width="175" height="75" rx="10" fill="#edf0f2"/>
    <text class="pin-number" x="208" y="23">5</text><text class="pin-name" x="278" y="45" text-anchor="middle">R_IS</text><text class="tiny" x="278" y="66" text-anchor="middle">not connected</text>
    <rect class="terminal" x="380" y="0" width="175" height="75" rx="10"/>
    <text class="pin-number" x="398" y="23">3</text><text class="pin-name" x="468" y="45" text-anchor="middle">R_EN</text><text class="tiny" x="468" y="66" text-anchor="middle">HIGH: Arduino 5V</text>
    <rect class="terminal" x="570" y="0" width="175" height="75" rx="10"/>
    <text class="pin-number" x="588" y="23">1</text><text class="pin-name" x="658" y="45" text-anchor="middle">RPWM</text><text class="tiny" x="658" y="66" text-anchor="middle">Arduino D9</text>
    <!-- bottom row -->
    <rect class="terminal" x="0" y="95" width="175" height="75" rx="10"/>
    <text class="pin-number" x="18" y="118">8</text><text class="pin-name" x="88" y="140" text-anchor="middle">GND</text><text class="tiny" x="88" y="161" text-anchor="middle">Arduino GND</text>
    <rect class="terminal" x="190" y="95" width="175" height="75" rx="10" fill="#edf0f2"/>
    <text class="pin-number" x="208" y="118">6</text><text class="pin-name" x="278" y="140" text-anchor="middle">L_IS</text><text class="tiny" x="278" y="161" text-anchor="middle">not connected</text>
    <rect class="terminal" x="380" y="95" width="175" height="75" rx="10"/>
    <text class="pin-number" x="398" y="118">4</text><text class="pin-name" x="468" y="140" text-anchor="middle">L_EN</text><text class="tiny" x="468" y="161" text-anchor="middle">HIGH: Arduino 5V</text>
    <rect class="terminal" x="570" y="95" width="175" height="75" rx="10"/>
    <text class="pin-number" x="588" y="118">2</text><text class="pin-name" x="658" y="140" text-anchor="middle">LPWM</text><text class="tiny" x="658" y="161" text-anchor="middle">Arduino D10</text>
  </g>

  <!-- Logic wires are routed around the header cells so every pin label remains readable. -->
  <path class="wire purple" d="M 700 864 H 735 V 750 H 1588 V 885"/>
  <path class="wire teal" d="M 700 926 H 810 V 1125 H 1588 V 1055"/>

  <!-- Arduino 5 V feeds VCC and holds both enable pins high. -->
  <path class="wire red" d="M 700 1009 H 770 V 865 H 1492"/>
  <path class="wire red" d="M 1018 865 V 885"/>
  <path class="wire red" d="M 1398 865 V 885"/>
  <path class="wire red" d="M 1492 865 V 1017 H 1485"/>

  <path class="wire black" d="M 700 1071 H 835 V 1100 H 1018 V 1055"/>
  <text class="wire-label" x="815" y="853" fill="#b72b25">5V bus</text>
  <text class="wire-label" x="1110" y="743" fill="#604099">D9</text>
  <text class="wire-label" x="1220" y="1117" fill="#007b80">D10</text>
  <text class="wire-label" x="865" y="1093" fill="#20272c">GND</text>
</svg>
