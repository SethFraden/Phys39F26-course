site_name: Phys 39 | Instrumentation and Thermal Physics
site_description: Student course site for Brandeis Physics 39, Fall 2026
site_author: Seth Fraden
docs_dir: course
site_dir: docs
use_directory_urls: true

theme:
  name: mkdocs
  locale: en
  navigation_depth: 3
  highlightjs: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Git, GitHub, VS Code, And AI: git-vscode-ai-workflow.md
  - Labs And Calendar: labs/index.md
  - Course Schedule: schedule.md
  - Hardware: hardware.md
  - Labs:
      - Lab 1: labs/lab-01/index.md
      - Lab 2: labs/lab-02/index.md
      - Lab 3: labs/lab-03/index.md
      - Lab 4: labs/lab-04/index.md
      - Lab 5: labs/lab-05/index.md
      - Lab 6: labs/lab-06/index.md
      - Lab 7: labs/lab-07/index.md
      - Upcoming Lab Modules: labs/upcoming.md
  - Arduino:
      - Arduino Tutorial: arduino/index.md
      - Uno Pinout: arduino/pinout.md
  - Safety: safety.md
  - Course Repository: repository.md
  - Legacy Resources: legacy.md

extra_css:
  - stylesheets/course.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
      smart_dollar: false
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
